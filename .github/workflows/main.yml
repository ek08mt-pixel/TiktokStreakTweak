name: Build iOS Tweak

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          export THEOS=/home/runner/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)" -- --no-sudo
      
      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          make package
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TweakPackage
          path: packages/*.deb
