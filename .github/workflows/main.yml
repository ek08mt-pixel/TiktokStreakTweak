name: Build iOS Tweak

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
      
      - name: Build Tweak
        run: |
          # Dùng đường dẫn mặc định mà script cài đặt tạo ra
          /home/runner/theos/bin/logos.pl Tweak.xm > Tweak.xm.mm
          make package THEOS=/home/runner/theos
